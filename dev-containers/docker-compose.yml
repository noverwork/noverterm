services:
  ########################
  # PostgreSQL + pgvecto.rs (Vector Search)
  ########################
  postgres:
    build: ./postgres
    environment:
      POSTGRES_DATABASES: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
    name: app
