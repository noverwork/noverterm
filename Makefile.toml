[config]
default_to_workspace = false

[tasks.dev]
description = "Start backend + Tauri desktop concurrently"
run_task = { name = ["backend-dev", "tauri-dev"], parallel = true }

[tasks.backend-dev]
description = "Start Rust backend"
command = "cargo"
args = ["run", "-p", "backend"]

[tasks.tauri-dev]
description = "Start Tauri desktop app"
cwd = "packages/desktop"
command = "npx"
args = ["@tauri-apps/cli", "dev"]
