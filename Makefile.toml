[config]
default_to_workspace = false

[tasks.dev]
description = "Start frontend + backend concurrently"
category = "Development"
run_task = { name = ["frontend-dev", "backend-dev"], parallel = true }

[tasks.frontend-dev]
description = "Start SvelteKit dev server"
category = "Development"
cwd = "packages/desktop/ui"
command = "npm"
args = ["run", "dev"]

[tasks.frontend-preview]
description = "Preview production build"
category = "Development"
cwd = "packages/desktop/ui"
command = "npm"
args = ["run", "preview"]

[tasks.frontend-check]
description = "Type check SvelteKit"
category = "Development"
cwd = "packages/desktop/ui"
command = "bash"
args = ["-c", "npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json"]

[tasks.frontend-check-watch]
description = "Type check SvelteKit (watch mode)"
category = "Development"
cwd = "packages/desktop/ui"
command = "bash"
args = ["-c", "npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json --watch"]

[tasks.backend-dev]
description = "Start Rust backend"
category = "Development"
command = "cargo"
args = ["run", "-p", "backend"]

[tasks.backend-build]
description = "Build Rust backend"
category = "Development"
command = "cargo"
args = ["build", "-p", "backend", "--release"]

[tasks.desktop-dev]
description = "Start Tauri desktop app"
category = "Development"
cwd = "packages/desktop"
command = "npx"
args = ["@tauri-apps/cli", "dev"]

[tasks.desktop-build]
description = "Build Tauri desktop app"
category = "Build"
cwd = "packages/desktop"
command = "npx"
args = ["@tauri-apps/cli", "build"]

[tasks.desktop-export-types]
description = "Export TypeScript bindings from Tauri"
category = "Development"
cwd = "packages/desktop"
command = "cargo"
args = ["run", "--bin", "export-types"]

[tasks.migrator-up]
description = "Run database migrations"
category = "Database"
command = "cargo"
args = ["run", "-p", "migrator", "--", "up"]

[tasks.migrator-create]
description = "Create a new migration"
category = "Database"
command = "cargo"
args = ["run", "-p", "migrator", "--", "create"]

[tasks.migrator-down]
description = "Revert last migration"
category = "Database"
command = "cargo"
args = ["run", "-p", "migrator", "--", "down"]

[tasks.migrator-refresh]
description = "Revert and reapply last migration"
category = "Database"
run_task = { name = ["migrator-down", "migrator-up"] }

[tasks.migrator-schema]
description = "Generate schema.rs from database"
category = "Database"
script = '''
diesel print-schema --config-file packages/orm/diesel.toml > packages/orm/src/schema.rs || echo 'DB not found, run migrator-up first'
'''

[tasks.ms-start]
description = "Start microservices"
category = "Infrastructure"
script = "./scripts/start-ms.sh"

[tasks.ms-stop]
description = "Stop microservices"
category = "Infrastructure"
script = "./scripts/stop-ms.sh"

[tasks.ms-restart]
description = "Restart microservices"
category = "Infrastructure"
run_task = { name = ["ms-stop", "ms-start"] }

[tasks.ms-reset]
description = "Reset microservices (delete and restart)"
category = "Infrastructure"
script = "./scripts/start-ms.sh --delete"

[tasks.ms-build]
description = "Build and start microservices"
category = "Infrastructure"
script = "./scripts/start-ms.sh --build"

[tasks.typecheck]
description = "Type check frontend"
category = "Quality"
run_task = { name = ["frontend-check"] }

[tasks.lint]
description = "Lint frontend + Rust"
category = "Quality"
run_task = { name = ["lint-frontend", "lint-rust"] }

[tasks.lint-frontend]
category = "Quality"
cwd = "packages/desktop/ui"
command = "npx"
args = ["eslint", "."]

[tasks.lint-rust]
category = "Quality"
command = "cargo"
args = ["clippy", "--workspace", "--", "-D", "warnings"]

[tasks.lint-fix]
description = "Auto-fix lint issues"
category = "Quality"
run_task = { name = ["lint-frontend-fix", "lint-rust-fix"] }

[tasks.lint-frontend-fix]
category = "Quality"
cwd = "packages/desktop/ui"
command = "npx"
args = ["eslint", ".", "--fix"]

[tasks.lint-rust-fix]
category = "Quality"
command = "cargo"
args = ["clippy", "--workspace", "--fix", "--allow-dirty"]

[tasks.fmt]
description = "Format frontend + Rust"
category = "Quality"
run_task = { name = ["format-frontend", "format-rust"] }

[tasks.format-frontend]
category = "Quality"
cwd = "packages/desktop/ui"
command = "npx"
args = ["prettier", "--write", "src/**/*"]

[tasks.format-rust]
category = "Quality"
command = "cargo"
args = ["fmt"]

[tasks.fmt-check]
description = "Check formatting"
category = "Quality"
run_task = { name = ["format-frontend-check", "format-rust-check"] }

[tasks.format-frontend-check]
category = "Quality"
cwd = "packages/desktop/ui"
command = "npx"
args = ["prettier", "--check", "src/**/*"]

[tasks.format-rust-check]
category = "Quality"
command = "cargo"
args = ["fmt", "--", "--check"]

[tasks.ci]
description = "Run full CI pipeline"
category = "CI"
run_task = { name = ["fmt-check", "lint", "typecheck", "backend-build", "frontend-build"] }

[tasks.frontend-build]
description = "Build frontend for production"
category = "Build"
cwd = "packages/desktop/ui"
command = "npm"
args = ["run", "build"]

[tasks.clean-all]
description = "Clean all build artifacts"
category = "Maintenance"
script = "rm -rf target dist build .svelte-kit packages/desktop/ui/dist packages/desktop/ui/.svelte-kit"

[tasks.clean]
alias = "clean-all"
