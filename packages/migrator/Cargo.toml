[package]
name = "migrator"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
path = "src/lib.rs"

[[bin]]
name = "migrator"
path = "src/main.rs"

[[bin]]
name = "seeds"
path = "src/seed.rs"

[[bin]]
name = "dev-seeds"
path = "src/dev_seed.rs"

[dependencies]
chrono = "0.4"
diesel = { version = "2.3", features = ["postgres", "serde_json", "chrono"] }
orm = { path = "../orm" }

[build-dependencies]
pathdiff = "0.2"
