---
kind: pipeline
type: kubernetes
name: noverterm-ci

steps:
  - name: rust-check
    image: rust:1.88-slim-bookworm
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends pkg-config libssl-dev libpq-dev
      - cargo check --package backend --package migrator

  - name: ui-check
    image: node:22.20.0-slim
    commands:
      - cd packages/desktop/ui
      - npm ci
      - npm run check
      - npm run test

trigger:
  event:
    - push
    - pull_request
  branch:
    - main

---
kind: pipeline
type: kubernetes
name: noverterm-build

steps:
  - name: build-backend
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    commands:
      - >
        /kaniko/executor
        --dockerfile=packages/backend/Dockerfile
        --context=dir:///drone/src
        --snapshot-mode=redo
        --destination=gitea.noverwork.com/noverwork/noverterm/backend:${DRONE_COMMIT_SHA:0:8}
        --destination=gitea.noverwork.com/noverwork/noverterm/backend:main
    volumes:
      - name: docker-config
        path: /kaniko/.docker
    depends_on:
      - clone

  - name: build-migrator
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    commands:
      - >
        /kaniko/executor
        --dockerfile=packages/migrator/Dockerfile
        --context=dir:///drone/src
        --snapshot-mode=redo
        --destination=gitea.noverwork.com/noverwork/noverterm/migrator:${DRONE_COMMIT_SHA:0:8}
        --destination=gitea.noverwork.com/noverwork/noverterm/migrator:main
    volumes:
      - name: docker-config
        path: /kaniko/.docker
    depends_on:
      - clone

volumes:
  - name: docker-config
    secret:
      name: docker-registry-config

trigger:
  event:
    - push
  branch:
    - main

---
kind: pipeline
type: kubernetes
name: noverterm-publish

steps:
  - name: publish-backend
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    commands:
      - >
        /kaniko/executor
        --dockerfile=packages/backend/Dockerfile
        --context=dir:///drone/src
        --snapshot-mode=redo
        --destination=gitea.noverwork.com/noverwork/noverterm/backend:latest
        --destination=gitea.noverwork.com/noverwork/noverterm/backend:${DRONE_TAG}
    volumes:
      - name: docker-config
        path: /kaniko/.docker
    depends_on:
      - clone

  - name: publish-migrator
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    commands:
      - >
        /kaniko/executor
        --dockerfile=packages/migrator/Dockerfile
        --context=dir:///drone/src
        --snapshot-mode=redo
        --destination=gitea.noverwork.com/noverwork/noverterm/migrator:latest
        --destination=gitea.noverwork.com/noverwork/noverterm/migrator:${DRONE_TAG}
    volumes:
      - name: docker-config
        path: /kaniko/.docker
    depends_on:
      - clone

volumes:
  - name: docker-config
    secret:
      name: docker-registry-config

trigger:
  event:
    - tag
